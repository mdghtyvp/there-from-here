<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>There From Here</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #2d5016;
      --slate: #6b7280;
      --barn: #8b2020;
      --mud: #8b6914;
      --ink: #3a3226;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--ink);
      background: #fff;
    }
    #game-container {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }
    header { text-align: center; margin-bottom: 14px; }
    header h1 {
      font-weight: 700;
      font-size: clamp(1.5rem, 7vw, 2.1rem);
      color: var(--forest);
      margin: 0 0 2px;
      letter-spacing: -0.5px;
    }
    header .sub {
      font-size: 0.82rem;
      color: var(--slate);
      font-weight: 500;
    }
    #map-area {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      aspect-ratio: 300 / 450;
      background: #fff;
      border-radius: 6px;
      touch-action: none;
    }
    #map-svg, #draw-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #draw-canvas { cursor: crosshair; touch-action: none; }
    .vt-outline {
      fill: rgba(245,240,232,0.6);
      stroke: var(--ink);
      stroke-width: 2.2;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .point-marker { fill: var(--barn); stroke: #fff; stroke-width: 1.5; }
    .point-label {
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700; fill: var(--ink);
      paint-order: stroke; stroke: #fff; stroke-width: 3px;
    }
    .point-name {
      font-family: 'Poppins', sans-serif;
      font-size: 10px; font-weight: 600; fill: var(--forest);
      paint-order: stroke; stroke: #fff; stroke-width: 3px;
    }
    .mtn-line { fill: none; stroke: var(--forest); stroke-width: 2.5; stroke-dasharray: 2 5; stroke-linecap: round; opacity: 0.7; }
    .mtn-label { font-family: 'Poppins'; font-style: italic; font-size: 9px; fill: var(--forest); }
    .interstate { fill: none; stroke: var(--mud); stroke-width: 3; opacity: 0.85; stroke-linejoin: round; }
    .shield { fill: var(--mud); stroke: #fff; stroke-width: 1; }
    .shield-label { font-family: 'Poppins'; font-size: 7px; font-weight: 700; fill: #fff; text-anchor: middle; }

    /* Submit button — prominent, directly under map */
    #submit-wrap {
      max-width: 360px;
      margin: 12px auto 0;
    }
    #submit-btn {
      width: 100%;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px;
      border: 2px solid var(--forest);
      border-radius: 10px;
      background: var(--forest);
      color: #fff;
      cursor: pointer;
      transition: transform 0.08s, opacity 0.15s;
      box-shadow: 2px 2px 0 rgba(45,80,22,0.25);
    }
    #submit-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(45,80,22,0.25); }
    #submit-btn:disabled { opacity: 0.4; cursor: default; box-shadow: none; }

    /* Controls bar */
    #controls { margin-top: 14px; max-width: 360px; margin-left: auto; margin-right: auto; }
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    /* Icon buttons */
    .icon-btn {
      background: none;
      border: none;
      padding: 6px;
      cursor: pointer;
      color: var(--slate);
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      transition: color 0.15s;
      border-radius: 6px;
    }
    .icon-btn:hover { color: var(--ink); }
    .icon-btn:disabled { opacity: 0.35; cursor: default; }
    .icon-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Hint controls */
    .hint-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #hint-btn {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 7px 14px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.08s;
      box-shadow: 2px 2px 0 rgba(58,50,38,0.15);
      white-space: nowrap;
    }
    #hint-btn:active { transform: translate(1px,1px); }
    #hint-btn:disabled { opacity: 0.4; cursor: default; box-shadow: none; }
    .hint-pips {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .pip {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid var(--slate);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .pip.checked {
      background: var(--mud);
      border-color: var(--mud);
    }
    .pip.checked::after {
      content: '';
      display: block;
      width: 4px; height: 7px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .max-note { font-size: 0.72rem; color: var(--slate); margin-top: 8px; text-align: center; min-height: 1em; }
    #msg { text-align: center; color: var(--barn); font-weight: 600; font-size: 0.82rem; min-height: 1.1em; margin-top: 6px; }

    #results {
      margin-top: 20px;
      text-align: center;
      padding: 18px 16px;
      border: 2px solid var(--ink);
      border-radius: 14px;
      background: #fff;
      box-shadow: 3px 3px 0 rgba(58,50,38,0.1);
    }
    #score-num { font-size: 3rem; font-weight: 700; color: var(--forest); line-height: 1; }
    #score-num span { font-size: 1.2rem; color: var(--slate); }
    #band { font-weight: 700; font-size: 1.05rem; margin: 8px 0 4px; color: var(--barn); }
    .stats { font-size: 0.85rem; color: var(--ink); margin: 10px 0; line-height: 1.6; }
    #share-btn {
      font-family: 'Poppins', sans-serif;
      font-weight: 600; font-size: 0.9rem;
      padding: 10px 20px;
      border: 2px solid var(--forest);
      border-radius: 10px;
      background: var(--forest); color: #fff;
      cursor: pointer; margin-top: 6px;
      box-shadow: 2px 2px 0 rgba(45,80,22,0.2);
    }
    #countdown { margin-top: 14px; font-size: 0.8rem; color: var(--slate); }
    #countdown b { color: var(--ink); font-variant-numeric: tabular-nums; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="game-container">
    <header>
      <h1>There From Here</h1>
      <div class="sub" id="puzzle-meta">Loading today's puzzle&hellip;</div>
    </header>

    <div id="map-area">
      <svg id="map-svg" viewBox="0 0 300 450" preserveAspectRatio="xMidYMid meet"></svg>
      <canvas id="draw-canvas" width="300" height="450"></canvas>
    </div>

    <div id="submit-wrap">
      <button id="submit-btn">Submit Route</button>
    </div>

    <div id="controls">
      <div class="controls-row">
        <!-- Undo / Clear icons -->
        <button class="icon-btn" id="undo-btn" title="Undo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 14L4 9l5-5"/>
            <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/>
          </svg>
          Undo
        </button>
        <button class="icon-btn" id="clear-btn" title="Start over">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          Start Over
        </button>
        <!-- Hint button + pip indicators -->
        <div class="hint-controls">
          <button id="hint-btn">Hint</button>
          <div class="hint-pips">
            <div class="pip" id="pip1"></div>
            <div class="pip" id="pip2"></div>
            <div class="pip" id="pip3"></div>
          </div>
        </div>
      </div>
      <div class="max-note" id="max-note"></div>
      <div id="msg"></div>
    </div>

    <div id="results" class="hidden">
      <div id="score-num">0<span>/100</span></div>
      <div id="band"></div>
      <div class="stats" id="stats"></div>
      <button id="share-btn">Share Result</button>
      <div id="countdown">Next puzzle in <b id="countdown-time">--:--:--</b></div>
    </div>
  </div>

</body>
</html>
