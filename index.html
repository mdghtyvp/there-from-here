<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>There From Here</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #2d5016;
      --slate: #6b7280;
      --barn: #8b2020;
      --mud: #8b6914;
      --ink: #3a3226;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: var(--ink);
      background: #fff;
    }

    /* ── Single-screen layout ── */
    #game-container {
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: 8px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Slim top bar */
    #top-bar {
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 2px;
    }
    #top-bar h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--forest);
      margin: 0;
      letter-spacing: -0.3px;
    }
    #puzzle-meta {
      font-size: 0.72rem;
      color: var(--slate);
      font-weight: 500;
    }

    /* Map wrapper — takes all remaining vertical space */
    #map-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #map-area {
      aspect-ratio: 2 / 3;
      height: 100%;
      max-height: 100%;
      position: relative;
      background: #fff;
      border-radius: 6px;
      touch-action: none;
    }
    #map-svg, #draw-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #draw-canvas { cursor: crosshair; touch-action: none; }

    /* SVG map styles */
    .vt-outline {
      fill: rgba(245,240,232,0.6);
      stroke: var(--ink);
      stroke-width: 2.2;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .point-marker { fill: var(--barn); stroke: #fff; stroke-width: 1.5; }
    .point-label {
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700; fill: var(--ink);
      paint-order: stroke; stroke: #fff; stroke-width: 3px;
    }
    .point-name {
      font-family: 'Poppins', sans-serif;
      font-size: 10px; font-weight: 600; fill: var(--forest);
      paint-order: stroke; stroke: #fff; stroke-width: 3px;
    }
    .mtn-line { fill: none; stroke: var(--forest); stroke-width: 2.5; stroke-dasharray: 2 5; stroke-linecap: round; opacity: 0.7; }
    .mtn-label { font-family: 'Poppins'; font-style: italic; font-size: 9px; fill: var(--forest); }
    .interstate { fill: none; stroke: var(--mud); stroke-width: 3; opacity: 0.85; stroke-linejoin: round; }
    .shield { fill: var(--mud); stroke: #fff; stroke-width: 1; }
    .shield-label { font-family: 'Poppins'; font-size: 7px; font-weight: 700; fill: #fff; text-anchor: middle; }

    /* Submit button */
    #submit-wrap { flex-shrink: 0; }
    #submit-btn {
      width: 100%;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 11px;
      border: 2px solid var(--forest);
      border-radius: 10px;
      background: var(--forest);
      color: #fff;
      cursor: pointer;
      transition: transform 0.08s, opacity 0.15s;
      box-shadow: 2px 2px 0 rgba(45,80,22,0.25);
    }
    #submit-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(45,80,22,0.25); }
    #submit-btn:disabled { opacity: 0.4; cursor: default; box-shadow: none; }

    /* Controls row */
    #controls { flex-shrink: 0; }
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .icon-btn {
      background: none;
      border: none;
      padding: 5px;
      cursor: pointer;
      color: var(--slate);
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      transition: color 0.15s;
      border-radius: 6px;
    }
    .icon-btn:hover { color: var(--ink); }
    .icon-btn:disabled { opacity: 0.35; cursor: default; }
    .icon-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .hint-controls { display: flex; align-items: center; gap: 8px; }
    #hint-btn {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 6px 12px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.08s;
      box-shadow: 2px 2px 0 rgba(58,50,38,0.15);
      white-space: nowrap;
    }
    #hint-btn:active { transform: translate(1px,1px); }
    #hint-btn:disabled { opacity: 0.4; cursor: default; box-shadow: none; }
    .hint-pips { display: flex; gap: 4px; align-items: center; }
    .pip {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--slate);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .pip.checked { background: var(--mud); border-color: var(--mud); }
    .pip.checked::after {
      content: '';
      display: block;
      width: 3px; height: 6px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .max-note { font-size: 0.68rem; color: var(--slate); text-align: center; min-height: 1em; margin-top: 4px; }
    #msg { text-align: center; color: var(--barn); font-weight: 600; font-size: 0.78rem; min-height: 1em; margin-top: 2px; }

    /* ── Splash overlays ── */
    .splash {
      position: fixed;
      inset: 0;
      background: rgba(58, 50, 38, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .splash-card {
      background: #fff;
      border: 2px solid var(--ink);
      border-radius: 18px;
      padding: 32px 24px 28px;
      max-width: 320px;
      width: 100%;
      box-shadow: 4px 4px 0 rgba(58,50,38,0.12);
      text-align: center;
      position: relative;
      overflow-y: auto;
      max-height: calc(100dvh - 40px);
    }
    .splash-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: var(--slate);
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }
    .splash-close:hover { color: var(--ink); }

    /* Title splash */
    #splash-title .splash-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--forest);
      margin: 0 0 6px;
      letter-spacing: -0.5px;
    }
    #splash-title .splash-meta {
      font-size: 0.8rem;
      color: var(--slate);
      font-weight: 500;
      margin-bottom: 24px;
    }
    #splash-title .splash-desc {
      font-size: 0.82rem;
      color: var(--ink);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    #play-btn {
      width: 100%;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 13px;
      border: 2px solid var(--forest);
      border-radius: 10px;
      background: var(--forest);
      color: #fff;
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(45,80,22,0.25);
      transition: transform 0.08s;
    }
    #play-btn:active { transform: translate(1px,1px); }

    /* Results splash */
    #score-num { font-size: 3rem; font-weight: 700; color: var(--forest); line-height: 1; }
    #score-num span { font-size: 1.2rem; color: var(--slate); }
    #band { font-weight: 700; font-size: 1rem; margin: 8px 0 4px; color: var(--barn); }
    .stats { font-size: 0.82rem; color: var(--ink); margin: 10px 0; line-height: 1.6; }
    #share-btn {
      font-family: 'Poppins', sans-serif;
      font-weight: 600; font-size: 0.88rem;
      padding: 9px 20px;
      border: 2px solid var(--forest);
      border-radius: 10px;
      background: var(--forest); color: #fff;
      cursor: pointer; margin-top: 4px;
      box-shadow: 2px 2px 0 rgba(45,80,22,0.2);
    }
    #countdown { margin-top: 12px; font-size: 0.78rem; color: var(--slate); }
    #countdown b { color: var(--ink); font-variant-numeric: tabular-nums; }

    /* Email signup in results splash */
    .signup-divider {
      border: none;
      border-top: 1px solid rgba(58,50,38,0.12);
      margin: 16px 0 14px;
    }
    .signup-copy {
      font-size: 0.78rem;
      color: var(--ink);
      line-height: 1.45;
      margin: 0 0 10px;
    }
    .signup-row {
      display: flex;
      gap: 6px;
    }
    #signup-email {
      flex: 1;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      padding: 8px 10px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      outline: none;
      color: var(--ink);
      min-width: 0;
    }
    #signup-email:focus { border-color: var(--forest); }
    #signup-submit {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 14px;
      border: 2px solid var(--forest);
      border-radius: 8px;
      background: var(--forest);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.08s;
    }
    #signup-submit:active { transform: translate(1px,1px); }
    #signup-submit:disabled { opacity: 0.5; cursor: default; }
    #signup-msg {
      font-size: 0.74rem;
      margin-top: 7px;
      min-height: 1em;
      color: var(--forest);
    }
    #signup-msg.error { color: var(--barn); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="top-bar">
      <h1>There From Here</h1>
      <div id="puzzle-meta"></div>
    </div>

    <div id="map-wrap">
      <div id="map-area">
        <svg id="map-svg" viewBox="0 0 300 450" preserveAspectRatio="xMidYMid meet"></svg>
        <canvas id="draw-canvas" width="300" height="450"></canvas>
      </div>
    </div>

    <div id="submit-wrap">
      <button id="submit-btn">Submit Route</button>
    </div>

    <div id="controls">
      <div class="controls-row">
        <button class="icon-btn" id="undo-btn" title="Undo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 14L4 9l5-5"/>
            <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/>
          </svg>
          Undo
        </button>
        <button class="icon-btn" id="clear-btn" title="Start over">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          Start Over
        </button>
        <div class="hint-controls">
          <button id="hint-btn">Hint</button>
          <div class="hint-pips">
            <div class="pip" id="pip1"></div>
            <div class="pip" id="pip2"></div>
            <div class="pip" id="pip3"></div>
          </div>
        </div>
      </div>
      <div class="max-note" id="max-note"></div>
      <div id="msg"></div>
    </div>
  </div>

  <!-- Title splash -->
  <div class="splash" id="splash-title">
    <div class="splash-card">
      <h1>There From Here</h1>
      <div class="splash-meta" id="splash-puzzle-meta">Loading&hellip;</div>
      <div class="splash-desc">Draw the driving route between two points on the Vermont map. The closer your line follows the real road, the higher your score.</div>
      <button id="play-btn">Play</button>
    </div>
  </div>

  <!-- Results splash -->
  <div class="splash hidden" id="splash-results">
    <div class="splash-card">
      <button class="splash-close" id="close-results" title="Close">✕</button>
      <div id="score-num">0<span>/100</span></div>
      <div id="band"></div>
      <div class="stats" id="stats"></div>
      <button id="share-btn">Share Result</button>
      <div id="countdown">Next puzzle in <b id="countdown-time">--:--:--</b></div>
      <hr class="signup-divider">
      <p class="signup-copy">Get a new puzzle daily alongside our latest headlines in <strong>The Frequency</strong> newsletter.</p>
      <div class="signup-row">
        <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email">
        <button id="signup-submit">Sign up</button>
      </div>
      <div id="signup-msg"></div>
    </div>
  </div>

  <script>
  window.PUZZLES_FALLBACK = {
    "puzzles": [
      { "id": 1, "date": "2026-06-07",
        "pointA": { "name": "St. Johnsbury", "lat": 44.4198, "lng": -72.0146 },
        "pointB": { "name": "Middlebury", "lat": 44.0154, "lng": -73.1673 },
        "optimalDistanceMiles": 85,
        "optimalRoute": [[44.420,-72.015],[44.418,-72.240],[44.260,-72.575],[44.200,-72.650],[44.160,-72.730],[44.100,-72.850],[44.050,-72.950],[44.020,-73.050],[44.015,-73.167]] }
    ]
  };
  </script>
  <script src="game.js"></script>
</body>
</html>
