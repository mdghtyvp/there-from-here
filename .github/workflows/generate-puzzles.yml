name: Generate Puzzles

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate puzzles
        run: node generate-puzzles.js

      - name: Commit puzzles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add puzzles.json
          git diff --staged --quiet || git commit -m "Regenerate puzzles with OSRM road snapping and 10-waypoint routes"
          git push
